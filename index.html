<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球工作时间 - World Clock</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="World Clock">
<link rel="apple-touch-icon" href="icon.svg">
<style>
  /* ============================================================
     ROOT VARIABLES
     ============================================================ */
  :root {
    --glass: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.10);
    --glass-hover: rgba(255, 255, 255, 0.10);
    --glass-strong: rgba(255, 255, 255, 0.10);
    --text: #f0edf6;
    --secondary: rgba(240, 237, 246, 0.65);
    --muted: rgba(240, 237, 246, 0.40);
    --accent: #a78bfa;
    --accent-glow: rgba(167, 139, 250, 0.35);
    --accent-bg: rgba(167, 139, 250, 0.12);
    --green: #34d399;
    --green-glow: rgba(52, 211, 153, 0.30);
    --orange: #fb923c;
    --orange-glow: rgba(251, 146, 60, 0.30);
    --gray: rgba(240, 237, 246, 0.30);
    --favorite: #fbbf24;
    --favorite-glow: rgba(251, 191, 36, 0.4);
    --radius: 20px;
    --radius-sm: 14px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    color: var(--text);
    padding: 22px 20px 34px;
    position: relative;
    overflow-x: hidden;
    background: #0f0a1a;
  }

  /* ---- ANIMATED GRADIENT BACKGROUND ---- */
  body::before {
    content: '';
    position: fixed;
    inset: -50%;
    z-index: -2;
    background:
      radial-gradient(ellipse 80% 60% at 15% 20%, rgba(139, 92, 246, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 30%, rgba(59, 130, 246, 0.12) 0%, transparent 55%),
      radial-gradient(ellipse 70% 60% at 50% 80%, rgba(236, 72, 153, 0.10) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 30% 70%, rgba(52, 211, 153, 0.06) 0%, transparent 50%);
    animation: gradientShift 20s ease-in-out infinite alternate;
  }

  body::after {
    content: '';
    position: fixed;
    inset: -50%;
    z-index: -1;
    background:
      radial-gradient(ellipse 60% 50% at 80% 15%, rgba(167, 139, 250, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse 50% 40% at 20% 60%, rgba(96, 165, 250, 0.06) 0%, transparent 50%);
    animation: gradientShift2 25s ease-in-out infinite alternate;
  }

  @keyframes gradientShift {
    0%   { transform: translate(0, 0) rotate(0deg); }
    50%  { transform: translate(5%, 3%) rotate(3deg); }
    100% { transform: translate(-3%, -2%) rotate(-2deg); }
  }

  @keyframes gradientShift2 {
    0%   { transform: translate(0, 0) rotate(0deg); }
    50%  { transform: translate(-4%, 2%) rotate(-3deg); }
    100% { transform: translate(3%, -3%) rotate(2deg); }
  }

  /* ---- NOISE OVERLAY ---- */
  .noise {
    position: fixed;
    inset: 0;
    z-index: -1;
    opacity: 0.035;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
  }

  .container { max-width: 1200px; margin: 0 auto; position: relative; }

  /* ============================================================
     GLASS CARD MIXIN
     ============================================================ */
  .glass {
    background: var(--glass);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .glass:hover {
    background: var(--glass-hover);
    border-color: rgba(255, 255, 255, 0.14);
    box-shadow:
      0 8px 32px rgba(0, 0, 0, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
  }

  /* ============================================================
     HEADER
     ============================================================ */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
    padding: 18px 24px;
    background: var(--glass);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    animation: fadeDown 0.6s ease-out;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0;
    background: linear-gradient(135deg, #f0edf6 0%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    font-size: 14px;
    color: var(--secondary);
  }

  /* ============================================================
     LOCAL TIME BAR
     ============================================================ */
  .local-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 0 auto 16px;
    padding: 18px 34px;
    max-width: 680px;
    background: linear-gradient(135deg,
      rgba(167, 139, 250, 0.10) 0%,
      rgba(255, 255, 255, 0.05) 50%,
      rgba(167, 139, 250, 0.06) 100%
    );
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border-radius: var(--radius);
    border: 1px solid var(--glass-border);
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    animation: fadeDown 0.6s ease-out 0.1s both;
    position: relative;
    overflow: hidden;
  }
  .local-bar::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: conic-gradient(from 0deg at 50% 50%,
      transparent 0deg,
      rgba(167, 139, 250, 0.03) 60deg,
      transparent 120deg,
      rgba(96, 165, 250, 0.03) 180deg,
      transparent 240deg,
      rgba(167, 139, 250, 0.03) 300deg,
      transparent 360deg
    );
    animation: shimmer 8s linear infinite;
    pointer-events: none;
  }
  @keyframes shimmer {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .local-bar .loc-icon {
    font-size: 20px;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    background: var(--accent-bg);
    border-radius: var(--radius-sm);
    position: relative;
    flex-shrink: 0;
  }
  .local-bar .loc-info { text-align: left; position: relative; z-index: 1; }
  .local-bar .loc-label {
    font-size: 11px;
    color: var(--secondary);
    letter-spacing: 1px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .local-bar .loc-time {
    font-size: 36px;
    font-weight: 280;
    letter-spacing: 5px;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(135deg, #c4b5fd 0%, #a78bfa 50%, #818cf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    text-shadow: 0 0 40px rgba(167, 139, 250, 0.3);
  }
  .local-bar .loc-date {
    font-size: 13px;
    color: var(--secondary);
    margin-left: 4px;
    padding-top: 2px;
    position: relative; z-index: 1;
  }
  .local-bar .loc-divider {
    width: 1px; height: 40px;
    background: var(--glass-border);
    flex-shrink: 0;
  }

  /* ============================================================
     STATS RIBBON
     ============================================================ */
  .ribbon {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin: 0 auto 16px;
    padding: 14px 20px;
    max-width: 820px;
    background: var(--glass);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    flex-wrap: wrap;
    animation: fadeDown 0.6s ease-out 0.2s both;
  }
  .ribbon-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--secondary);
  }
  .ribbon-item .num {
    font-size: 20px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    min-width: 28px;
    text-align: center;
    transition: all 0.3s;
  }
  .ribbon-item .num.green {
    color: var(--green);
    text-shadow: 0 0 20px var(--green-glow);
  }
  .ribbon-item .num.orange {
    color: var(--orange);
    text-shadow: 0 0 20px var(--orange-glow);
  }
  .ribbon-item .num.gray { color: var(--gray); }

  /* ============================================================
     TOOLBAR
     ============================================================ */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    padding: 14px;
    background: var(--glass);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    animation: fadeDown 0.6s ease-out 0.3s both;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
    max-width: 400px;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 17px;
    height: 17px;
    color: var(--muted);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 11px 16px 11px 42px;
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    background: var(--glass-strong);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: all 0.3s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus {
    box-shadow: 0 0 0 3px var(--accent-glow), 0 0 20px var(--accent-glow);
    border-color: rgba(167, 139, 250, 0.3);
    background: rgba(255, 255, 255, 0.08);
  }

  .filters {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .filter-btn {
    padding: 7px 16px;
    border: 1px solid transparent;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.04);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.25s;
  }
  .filter-btn:hover {
    background: rgba(255, 255, 255, 0.08);
    color: var(--secondary);
  }
  .filter-btn.active {
    background: var(--accent-bg);
    border-color: rgba(167, 139, 250, 0.2);
    color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  /* ============================================================
     CITY GRID
     ============================================================ */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }

  .city-card {
    position: relative;
    padding: 22px 18px 18px;
    border-radius: var(--radius);
    background: var(--glass);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    overflow: hidden;
    min-height: 150px;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--glass-border);
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.2),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
    animation: cardEnter 0.5s ease-out both;
    cursor: default;
  }

  /* Staggered animation delay via JS */
  .city-card:nth-child(1)  { animation-delay: calc(0.05s * 1); }
  .city-card:nth-child(2)  { animation-delay: calc(0.05s * 2); }
  .city-card:nth-child(3)  { animation-delay: calc(0.05s * 3); }
  .city-card:nth-child(4)  { animation-delay: calc(0.05s * 4); }
  .city-card:nth-child(5)  { animation-delay: calc(0.05s * 5); }
  .city-card:nth-child(6)  { animation-delay: calc(0.05s * 6); }
  .city-card:nth-child(7)  { animation-delay: calc(0.05s * 7); }
  .city-card:nth-child(8)  { animation-delay: calc(0.05s * 8); }
  .city-card:nth-child(9)  { animation-delay: calc(0.05s * 9); }
  .city-card:nth-child(10) { animation-delay: calc(0.05s * 10); }
  .city-card:nth-child(11) { animation-delay: calc(0.05s * 11); }
  .city-card:nth-child(12) { animation-delay: calc(0.05s * 12); }
  .city-card:nth-child(13) { animation-delay: calc(0.05s * 13); }
  .city-card:nth-child(14) { animation-delay: calc(0.05s * 14); }
  .city-card:nth-child(15) { animation-delay: calc(0.05s * 15); }
  .city-card:nth-child(16) { animation-delay: calc(0.05s * 16); }
  .city-card:nth-child(17) { animation-delay: calc(0.05s * 17); }
  .city-card:nth-child(18) { animation-delay: calc(0.05s * 18); }
  .city-card:nth-child(19) { animation-delay: calc(0.05s * 19); }
  .city-card:nth-child(20) { animation-delay: calc(0.05s * 20); }
  .city-card:nth-child(21) { animation-delay: calc(0.05s * 21); }
  .city-card:nth-child(22) { animation-delay: calc(0.05s * 22); }
  .city-card:nth-child(23) { animation-delay: calc(0.05s * 23); }
  .city-card:nth-child(24) { animation-delay: calc(0.05s * 24); }

  @keyframes cardEnter {
    0% {
      opacity: 0;
      transform: translateY(20px) scale(0.96);
    }
    100% {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .city-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: -50%;
    width: 200%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(255, 255, 255, 0.03) 50%,
      transparent 100%
    );
    transform: skewX(-15deg);
    transition: transform 0.6s;
    pointer-events: none;
  }

  .city-card:hover::before {
    transform: skewX(-15deg) translateX(100%);
  }

  .city-card:hover {
    background: rgba(255, 255, 255, 0.09);
    transform: translateY(-4px);
    border-color: rgba(255, 255, 255, 0.16);
    box-shadow:
      0 12px 40px rgba(0, 0, 0, 0.35),
      inset 0 1px 0 rgba(255, 255, 255, 0.10);
  }

  .city-card .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    transition: all 0.5s;
  }
  .city-card .top-bar.day {
    background: linear-gradient(90deg, rgba(52, 211, 153, 0.4), rgba(96, 165, 250, 0.4));
    box-shadow: 0 0 12px rgba(52, 211, 153, 0.2);
  }
  .city-card .top-bar.night {
    background: linear-gradient(90deg, rgba(148, 163, 184, 0.3), rgba(100, 116, 139, 0.3));
  }
  .city-card .top-bar.twilight {
    background: linear-gradient(90deg, rgba(251, 146, 60, 0.4), rgba(196, 181, 253, 0.4));
    box-shadow: 0 0 12px rgba(251, 146, 60, 0.2);
  }

  .favorite-btn {
    position: absolute;
    top: 12px;
    left: 14px;
    width: 28px;
    height: 28px;
    border: 0;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.25);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 28px;
    transition: all 0.3s;
    z-index: 2;
  }
  .favorite-btn.active {
    color: var(--favorite);
    background: rgba(251, 191, 36, 0.15);
    box-shadow: 0 0 16px var(--favorite-glow);
  }
  .favorite-btn:hover {
    transform: scale(1.15);
  }

  .city-card .work-badge {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 10.5px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.3px;
    transition: all 0.3s;
    z-index: 1;
  }
  .city-card .work-badge.open {
    background: rgba(52, 211, 153, 0.10);
    color: var(--green);
    border: 1px solid rgba(52, 211, 153, 0.15);
    box-shadow: 0 0 16px var(--green-glow);
    animation: pulseGlow 2s ease-in-out infinite;
  }
  .city-card .work-badge.closed {
    background: rgba(255, 255, 255, 0.04);
    color: var(--gray);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .city-card .work-badge.lunch {
    background: rgba(251, 146, 60, 0.10);
    color: var(--orange);
    border: 1px solid rgba(251, 146, 60, 0.15);
    box-shadow: 0 0 16px var(--orange-glow);
  }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 8px var(--green-glow); }
    50% { box-shadow: 0 0 20px var(--green-glow); }
  }

  .city-card .tz-label {
    position: absolute;
    top: 14px;
    left: 52px;
    font-size: 10.5px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .city-card .city-info {
    margin-top: 32px;
    margin-bottom: 8px;
  }
  .city-card .city-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .city-card .city-name .en {
    font-weight: 400;
    color: var(--secondary);
    font-size: 13px;
    margin-left: 6px;
  }
  .city-card .country-name {
    font-size: 12px;
    color: var(--secondary);
    margin-top: 1px;
  }
  .city-card .country-name .en {
    color: var(--muted);
    margin-left: 4px;
  }

  .city-card .clock-time {
    font-size: 32px;
    font-weight: 280;
    letter-spacing: 3px;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 2px;
    text-shadow: 0 0 30px rgba(240, 237, 246, 0.08);
    transition: all 0.3s;
  }

  .city-card .clock-date {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .city-card .diff-tag {
    position: absolute;
    bottom: 18px;
    right: 18px;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 10px;
    background: var(--accent-bg);
    color: var(--secondary);
    font-weight: 500;
    backdrop-filter: blur(4px);
  }
  .city-card .diff-tag .strong {
    color: var(--accent);
    font-weight: 700;
  }

  .city-card.hidden { display: none; }

  .city-card.highlight {
    border-color: rgba(52, 211, 153, 0.15);
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.2),
      0 0 0 1px rgba(52, 211, 153, 0.05),
      inset 0 1px 0 rgba(255, 255, 255, 0.06);
  }
  .city-card.highlight:hover {
    border-color: rgba(52, 211, 153, 0.25);
    box-shadow:
      0 12px 40px rgba(0, 0, 0, 0.35),
      0 0 0 1px rgba(52, 211, 153, 0.10),
      inset 0 1px 0 rgba(255, 255, 255, 0.10);
  }

  /* ---- EMPTY STATE ---- */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--secondary);
    font-size: 15px;
  }

  /* ---- FOOTER ---- */
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
    animation: fadeDown 0.6s ease-out 0.4s both;
  }

  /* ============================================================
     KEYFRAMES
     ============================================================ */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 500px) {
    body { padding: 14px 10px 24px; }
    .header { display: block; text-align: left; padding: 14px 16px; }
    .header h1 { font-size: 22px; }
    .local-bar { padding: 14px 18px; gap: 10px; flex-wrap: wrap; }
    .local-bar .loc-time { font-size: 28px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 10px; }
    .toolbar { padding: 10px; }

// ============================================================
// HELPERS
// ============================================================
function getTZLabel(tz) {
  try {
    const now = new Date();
    const f = new Intl.DateTimeFormat('zh-CN', { timeZone: tz, timeZoneName: 'longOffset' });
    const p = f.formatToParts(now);
    const v = p.find(x => x.type === 'timeZoneName')?.value || '';
    const m = v.match(/GMT([+-]\d{2}):(\d{2})/);
    if (m) {
      const h = parseInt(m[1]); const min = parseInt(m[2]);
      return `UTC${h < 0 ? '' : '+'}${h}${min ? ':'+String(min).padStart(2,'0') : ''}`;
    }
    return '';
  } catch { return ''; }
}

function getTimeIn(tz) {
  const f = new Intl.DateTimeFormat('zh-CN', { timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false });
  return f.format(new Date());
}

function getDateIn(tz) {
  const f = new Intl.DateTimeFormat('zh-CN', { timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit', weekday:'short' });
  return f.format(new Date());
}

function getHourMinute(tz) {
  const f = new Intl.DateTimeFormat('zh-CN', { timeZone: tz, hour:'2-digit', minute:'2-digit', hour12: false });
  const s = f.format(new Date());
  const [h, m] = s.split(':').map(Number);
  return { h, m };
}

function getWeekday(tz) {
  const f = new Intl.DateTimeFormat('zh-CN', { timeZone: tz, weekday: 'long' });
  return f.format(new Date());
}

function getWorkStatus(tz) {
  const { h, m } = getHourMinute(tz);
  const wd = getWeekday(tz);
  const isSunday = wd === '星期日' || wd === 'Sunday';
  if (isSunday) return 'closed';
  const minutes = h * 60 + m;
  if (minutes >= 9*60 && minutes < 12*60) return 'open';
  if (minutes >= 12*60 && minutes < 14*60) return 'lunch';
  if (minutes >= 14*60 && minutes < 18*60) return 'open';
  return 'closed';
}

function getDiffLabel(tz) {
  try {
    const local = new Date();
    const localOff = -local.getTimezoneOffset();
    const f = new Intl.DateTimeFormat('zh-CN', { timeZone: tz, timeZoneName: 'longOffset' });
    const p = f.formatToParts(local);
    const v = p.find(x => x.type === 'timeZoneName')?.value || '';
    const m = v.match(/GMT([+-]\d{1,2})(?::?(\d{2}))?/);
    if (!m) return '';
    const targetOff = parseInt(m[1]) * 60 + (parseInt(m[2]) || 0);
    const diff = targetOff - localOff;
    if (diff === 0) return 'Same';
    const abs = Math.abs(diff);
    const hh = Math.floor(abs / 60);
    const mm = abs % 60;
    const s = `${hh}h${String(mm).padStart(2, '0')}`;
    return diff > 0 ? `+${s}` : `-${s}`;
  } catch { return ''; }
}

function getPeriod(hour) {
  if (hour >= 6 && hour < 18) return 'day';
  if ((hour >= 5 && hour < 6) || (hour >= 18 && hour < 20)) return 'twilight';
  return 'night';
}

function periodEmoji(p) {
  return p === 'day' ? '☀️' : p === 'twilight' ? '🌆' : '🌙';
}

function workStatusMeta(s) {
  if (s === 'open')  return { labelCN: '工作中', labelEN: 'Working', cls: 'open', dot: '●' };
  if (s === 'lunch') return { labelCN: '午休中', labelEN: 'Lunch',   cls: 'lunch', dot: '●' };
  return { labelCN: '已下班', labelEN: 'Off', cls: 'closed', dot: '○' };
}

// ============================================================
// RENDER
// ============================================================
const grid          = document.getElementById('cityGrid');
const searchInput   = document.getElementById('searchInput');
const filterBtns    = document.querySelectorAll('.filter-btn');
const localTimeEl   = document.getElementById('localTime');
const localDateEl   = document.getElementById('localDate');
const statWorking   = document.getElementById('statWorking');
const statLunch     = document.getElementById('statLunch');
const statOff       = document.getElementById('statOff');
const statTotal     = document.getElementById('statTotal');

let currentFilter = 'all';
let currentSearch = '';
let favorites = new Set(JSON.parse(localStorage.getItem('worldClockFavorites') || '[]'));

function saveFavorites() {
  localStorage.setItem('worldClockFavorites', JSON.stringify([...favorites].sort()));
}

function toggleFavorite(tz) {
  if (favorites.has(tz)) favorites.delete(tz);
  else favorites.add(tz);
  saveFavorites();
  render();
}

// Number animation for stats
function animateNumber(el, target) {
  const current = parseInt(el.textContent) || 0;
  if (current === target) return;
  const diff = target - current;
  const duration = 400;
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(current + diff * eased);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function render() {
  const search = currentSearch.toLowerCase().trim();

  let wCount = 0, lCount = 0, oCount = 0;

  const sortedCapitals = [...capitals].sort((a, b) => {
    const af = favorites.has(a.tz) ? 0 : 1;
    const bf = favorites.has(b.tz) ? 0 : 1;
    if (af !== bf) return af - bf;
    return a.countryEn.localeCompare(b.countryEn);
  });

  const cards = sortedCapitals.map(city => {
    const isFavorite = favorites.has(city.tz);
    const match = (
      city.country.includes(search) ||
      city.capital.includes(search) ||
      city.countryEn.toLowerCase().includes(search) ||
      city.capitalEn.toLowerCase().includes(search)
    );
    const filterMatch = currentFilter === 'all'
      || (currentFilter === 'favorites' && isFavorite)
      || city.continent === currentFilter;
    const visible = match && filterMatch;

    let time, date, ws, period, emoji, offset, diff, meta;
    try {
      time   = getTimeIn(city.tz);
      date   = getDateIn(city.tz);
      ws     = getWorkStatus(city.tz);
      meta   = workStatusMeta(ws);
      const { h } = getHourMinute(city.tz);
      period = getPeriod(h);
      emoji  = periodEmoji(period);
      offset = getTZLabel(city.tz);
      diff   = getDiffLabel(city.tz);

      if (visible) {
        if (ws === 'open') wCount++;
        else if (ws === 'lunch') lCount++;
        else oCount++;
      }
    } catch {
      return { city, visible, html: `<div class="city-card" style="opacity:0.5"><div class="city-name">${city.capital} <span class="en">${city.capitalEn}</span></div><div class="country-name">${city.country} <span class="en">${city.countryEn}</span></div></div>` };
    }

    const highlight  = ws === 'open' ? ' highlight' : '';

    const html = `<div class="city-card${highlight}" data-continent="${city.continent}" data-tz="${city.tz}">
      <div class="top-bar ${period}"></div>
      <div class="tz-label">${offset}</div>
      <button class="favorite-btn${isFavorite ? ' active' : ''}" data-tz="${city.tz}" aria-label="Toggle favorite">${isFavorite ? '★' : '☆'}</button>
      <span class="work-badge ${meta.cls}">${meta.dot} ${meta.labelEN}</span>
      <div class="city-info">
        <div class="city-name">${emoji} ${city.capital} <span class="en">${city.capitalEn}</span></div>
        <div class="country-name">${city.country} <span class="en">· ${city.countryEn}</span></div>
      </div>
      <div class="clock-time">${time}</div>
      <div class="clock-date">${date}</div>
      ${diff ? `<span class="diff-tag"><span class="strong">${diff}</span></span>` : ''}
    </div>`;

    return { city, visible, html };
  });

  const visibleCount = cards.filter(c => c.visible).length;

  animateNumber(statWorking, wCount);
  animateNumber(statLunch, lCount);
  animateNumber(statOff, oCount);
  statTotal.textContent = currentFilter === 'favorites' ? favorites.size : capitals.length;

  grid.innerHTML = cards.map(c => c.visible ? c.html : '<div class="city-card hidden"></div>').join('');

  grid.querySelectorAll('.favorite-btn').forEach(btn => {
    btn.addEventListener('click', event => {
      event.stopPropagation();
      toggleFavorite(btn.dataset.tz);
    });
  });

  // Re-trigger card entrance animation on filter change
  document.querySelectorAll('.city-card:not(.hidden)').forEach((card, i) => {
    card.style.animation = 'none';
    card.offsetHeight; // force reflow
    card.style.animation = `cardEnter 0.5s ease-out ${i * 0.03}s both`;
  });

  if (visibleCount === 0 && capitals.length > 0) {
    grid.innerHTML += `<div class="empty">🔍 No results / 没有找到匹配 "<strong>${currentSearch}</strong>"</div>`;
  }
}

// ============================================================
// LOCAL TIME
// ============================================================
function updateLocalTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  localTimeEl.textContent = `${h}:${m}:${s}`;
  localDateEl.textContent = now.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  }) + ' · ' + now.toLocaleDateString('zh-CN', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
}

function updateCardTimes() {
  grid.querySelectorAll('.city-card[data-tz]').forEach(card => {
    const tz = card.dataset.tz;
    try {
      const timeEl = card.querySelector('.clock-time');
      const dateEl = card.querySelector('.clock-date');
      const diffEl = card.querySelector('.diff-tag .strong');
      if (timeEl) timeEl.textContent = getTimeIn(tz);
      if (dateEl) dateEl.textContent = getDateIn(tz);
      if (diffEl) diffEl.textContent = getDiffLabel(tz);
    } catch {}
  });
}

// ============================================================
// EVENTS
// ============================================================
searchInput.addEventListener('input', () => {
  currentSearch = searchInput.value;
  render();
});

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.addEventListener('keydown', e => {
  if ((e.key === '/' || (e.key === 'f' && (e.ctrlKey || e.metaKey))) && document.activeElement !== searchInput) {
    if (e.key === 'f') return;
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') searchInput.blur();
});

// ============================================================
// TICK
// ============================================================
updateLocalTime();
render();
setInterval(() => {
  updateLocalTime();
  updateCardTimes();
}, 1000);

setInterval(render, 60000);

console.log(`🌍 World Business Hours loaded — ${capitals.length} countries`);

// Register service worker for PWA install support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
