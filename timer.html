<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专注计时</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(145deg, #f7f3ee 0%, #efe9e0 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #5a4e42;
    user-select: none;
  }

  /* ===== CONTAINER ===== */
  .app {
    width: 420px;
    background: rgba(255, 251, 245, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 40px;
    padding: 40px 36px 36px;
    box-shadow:
      0 20px 60px rgba(120, 90, 70, 0.12),
      0 0 0 1px rgba(255, 251, 245, 0.6) inset;
    transition: box-shadow 0.4s;
  }

  /* ===== MODE TABS ===== */
  .tabs {
    display: flex;
    gap: 6px;
    background: rgba(200, 180, 160, 0.18);
    border-radius: 16px;
    padding: 4px;
    margin-bottom: 32px;
  }
  .tab {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    border: none;
    background: transparent;
    border-radius: 13px;
    font-size: 14px;
    font-weight: 500;
    color: #8a7a6a;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.3px;
  }
  .tab:hover { color: #6b5b4b; }
  .tab.active {
    background: #fff;
    color: #5a4e42;
    box-shadow: 0 2px 8px rgba(120, 90, 70, 0.10);
  }

  /* ===== TIMER DISPLAY ===== */
  .timer-wrap {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 0 auto 24px;
  }
  .timer-ring-bg {
    fill: none;
    stroke: rgba(180, 160, 140, 0.15);
    stroke-width: 6;
  }
  .timer-ring-progress {
    fill: none;
    stroke: #a8b5a0;
    stroke-width: 6;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
    transition: stroke-dashoffset 0.4s ease, stroke 0.5s;
  }
  .timer-ring-progress.running { stroke: #9aaa90; }
  .timer-ring-progress.alert { stroke: #d4a090; }

  .timer-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .timer-label {
    font-size: 13px;
    font-weight: 500;
    color: #b0a090;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .timer-display {
    font-size: 58px;
    font-weight: 300;
    letter-spacing: 4px;
    color: #4a3f35;
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }
  .timer-display.alert { color: #c08070; }

  /* ===== CONTROLS ===== */
  .controls {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .btn {
    border: none;
    border-radius: 50%;
    width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.25s;
    background: rgba(200, 180, 160, 0.15);
    color: #6b5b4b;
  }
  .btn:hover {
    background: rgba(200, 180, 160, 0.28);
    transform: scale(1.04);
  }
  .btn:active { transform: scale(0.94); }
  .btn svg { width: 22px; height: 22px; }
  .btn-primary {
    width: 68px; height: 68px;
    background: #a8b5a0;
    color: #fff;
    box-shadow: 0 4px 16px rgba(168, 181, 160, 0.35);
  }
  .btn-primary:hover {
    background: #9aaa90;
    box-shadow: 0 6px 24px rgba(168, 181, 160, 0.4);
    transform: scale(1.05);
  }
  .btn-primary:active { transform: scale(0.93); }

  /* ===== PRESET ROW ===== */
  .presets {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .preset {
    padding: 7px 18px;
    border: 1px solid rgba(180, 160, 140, 0.25);
    border-radius: 20px;
    background: transparent;
    font-size: 13px;
    font-weight: 500;
    color: #8a7a6a;
    cursor: pointer;
    transition: all 0.25s;
  }
  .preset:hover {
    border-color: #a8b5a0;
    color: #5a4e42;
    background: rgba(168, 181, 160, 0.08);
  }
  .preset.active {
    background: #a8b5a0;
    border-color: #a8b5a0;
    color: #fff;
  }

  /* ===== CUSTOM INPUT ===== */
  .custom-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .custom-input {
    width: 48px;
    padding: 6px 0;
    text-align: center;
    border: none;
    border-bottom: 2px solid rgba(180, 160, 140, 0.3);
    background: transparent;
    font-size: 16px;
    font-weight: 500;
    color: #5a4e42;
    outline: none;
    transition: border-color 0.3s;
  }
  .custom-input:focus { border-color: #a8b5a0; }
  .custom-input::-webkit-inner-spin-button { display: none; }
  .custom-label { font-size: 14px; color: #a09080; }

  /* ===== SESSION INFO ===== */
  .session-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding-top: 20px;
    border-top: 1px solid rgba(180, 160, 140, 0.15);
    font-size: 13px;
    color: #b0a090;
  }
  .session-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #c8bcb0;
    transition: background 0.3s;
  }
  .session-dot.done { background: #a8b5a0; }
  .session-info { display: flex; align-items: center; gap: 8px; }
  .session-count { font-weight: 600; color: #8a7a6a; min-width: 32px; }

  /* ===== NOTIFICATION ===== */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(60, 55, 50, 0.92);
    backdrop-filter: blur(12px);
    color: #f5ede4;
    padding: 16px 32px;
    border-radius: 16px;
    font-size: 15px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 460px) {
    .app { width: 94vw; padding: 28px 20px 24px; border-radius: 28px; }
    .timer-wrap { width: 200px; height: 200px; }
    .timer-display { font-size: 44px; }
    .btn { width: 48px; height: 48px; }
    .btn-primary { width: 58px; height: 58px; }
    .btn svg { width: 18px; height: 18px; }
    .preset { padding: 5px 14px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="app" role="main">

  <!-- Mode Tabs -->
  <div class="tabs" role="tablist">
    <button class="tab active" data-mode="focus" role="tab">🍃 专注</button>
    <button class="tab" data-mode="countdown" role="tab">⏳ 倒计时</button>
    <button class="tab" data-mode="stopwatch" role="tab">⏱ 秒表</button>
  </div>

  <!-- Timer Circle -->
  <div class="timer-wrap">
    <svg viewBox="0 0 130 130" width="260" height="260">
      <circle class="timer-ring-bg" cx="65" cy="65" r="58"/>
      <circle class="timer-ring-progress" id="progressRing" cx="65" cy="65" r="58"
        stroke-dasharray="364.4" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-center">
      <span class="timer-label" id="modeLabel">专注 25:00</span>
      <span class="timer-display" id="timerDisplay">25:00</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn" id="resetBtn" title="重置" aria-label="重置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
    </button>
    <button class="btn btn-primary" id="mainBtn" title="开始" aria-label="开始">
      <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
    </button>
    <button class="btn" id="settingsBtn" title="配色" aria-label="配色">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </div>

  <!-- Presets (Focus mode) -->
  <div class="presets" id="presetRow">
    <button class="preset" data-min="5">5分</button>
    <button class="preset active" data-min="25">25分</button>
    <button class="preset" data-min="30">30分</button>
    <button class="preset" data-min="45">45分</button>
    <button class="preset" data-min="60">60分</button>
  </div>

  <!-- Custom input (countdown mode) -->
  <div class="custom-row" id="customRow" style="display:none">
    <input class="custom-input" type="number" id="customMin" min="0" max="480" value="10">
    <span class="custom-label">分</span>
    <input class="custom-input" type="number" id="customSec" min="0" max="59" value="0">
    <span class="custom-label">秒</span>
    <button class="preset" id="applyCustom" style="margin-left:4px">确定</button>
  </div>

  <!-- Session Bar -->
  <div class="session-bar">
    <span>已专注</span>
    <span class="session-count" id="sessionCount">0</span>
    <span class="session-info">
      <span class="session-dot done"></span>
      <span class="session-dot done"></span>
      <span class="session-dot"></span>
      <span class="session-dot"></span>
      <span class="session-dot"></span>
    </span>
    <span>轮</span>
  </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<script>
// ============================================
// STATE
// ============================================
const STATE = {
  mode: 'focus',
  status: 'idle',
  totalSeconds: 1500,
  remaining: 1500,
  elapsed: 0,
  focusCount: 0,
};

// ============================================
// DOM REFS
// ============================================
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

const display     = $('#timerDisplay');
const label       = $('#modeLabel');
const ring        = $('#progressRing');
const mainBtn     = $('#mainBtn');
const resetBtn    = $('#resetBtn');
const settingsBtn = $('#settingsBtn');
const presetRow   = $('#presetRow');
const customRow   = $('#customRow');
const tabs        = $$('.tab');
const presetBtns  = $$('.preset');
const sessionCount = $('#sessionCount');
const sessionDots  = $$('.session-dot');
const toast       = $('#toast');
const customMin   = $('#customMin');
const customSec   = $('#customSec');
const applyCustom = $('#applyCustom');

const CIRCUM = 364.4; // 2 * π * 58
let timerId = null;
let soundCtx = null;
let quitLongFocusWarned = false;

// ============================================
// SOUND (Web Audio API — no external files)
// ============================================
function playBell() {
  try {
    if (!soundCtx) soundCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = soundCtx.currentTime;
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = soundCtx.createOscillator();
      const gain = soundCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.25, now + i * 0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.18 + 0.6);
      osc.connect(gain).connect(soundCtx.destination);
      osc.start(now + i * 0.18);
      osc.stop(now + i * 0.18 + 0.6);
    });
  } catch (_) { /* silent fallback */ }
}

// ============================================
// TOAST
// ============================================
let toastTimer = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
}

// ============================================
// TIMER MATH
// ============================================
function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateDisplay() {
  let sec;
  if (STATE.mode === 'stopwatch') sec = STATE.elapsed;
  else sec = STATE.remaining;
  display.textContent = fmt(sec);

  if (STATE.mode === 'stopwatch') {
    ring.style.strokeDashoffset = CIRCUM;
  } else if (STATE.totalSeconds > 0) {
    const progress = STATE.remaining / STATE.totalSeconds;
    ring.style.strokeDashoffset = CIRCUM * (1 - progress);
  }

  // Alert color when < 10% remaining
  if (STATE.mode !== 'stopwatch' && STATE.totalSeconds > 0 && STATE.remaining / STATE.totalSeconds < 0.1 && STATE.status === 'running') {
    ring.classList.add('alert');
    display.classList.add('alert');
  } else {
    ring.classList.remove('alert');
    display.classList.remove('alert');
  }

  const modeNames = { focus: '专注', countdown: '倒计时', stopwatch: '秒表' };
  label.textContent = modeNames[STATE.mode] + ' ' + display.textContent;
}

function updateSessionBar() {
  sessionCount.textContent = STATE.focusCount;
  sessionDots.forEach((dot, i) => {
    dot.classList.toggle('done', i < STATE.focusCount % 5);
  });
}

// ============================================
// CORE ACTIONS
// ============================================
function startTimer() {
  if (STATE.status === 'finished') resetTimer();

  if (STATE.mode !== 'stopwatch' && STATE.remaining <= 0) return;
  if (STATE.mode === 'stopwatch' && STATE.status === 'idle') STATE.elapsed = 0;

  STATE.status = 'running';
  mainBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
  mainBtn.title = '暂停';
  ring.classList.remove('alert');
  display.classList.remove('alert');
  ring.classList.add('running');

  timerId = setInterval(tick, 1000);
}

function pauseTimer() {
  STATE.status = 'paused';
  clearInterval(timerId); timerId = null;
  mainBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>`;
  mainBtn.title = '继续';
  ring.classList.remove('running');
}

function resetTimer() {
  clearInterval(timerId); timerId = null;
  STATE.status = 'idle';

  if (STATE.mode === 'stopwatch') STATE.elapsed = 0;
  else STATE.remaining = STATE.totalSeconds;

  mainBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>`;
  mainBtn.title = '开始';
  ring.classList.remove('running', 'alert');
  display.classList.remove('alert');
  updateDisplay();
}

function finishTimer() {
  clearInterval(timerId); timerId = null;
  STATE.status = 'finished';

  mainBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  mainBtn.title = '完成 ✓';
  ring.classList.remove('running');
  ring.classList.add('alert');
  display.classList.add('alert');

  if (STATE.mode === 'focus') {
    STATE.focusCount++;
    updateSessionBar();
  }

  const modeNames = { focus: '专注', countdown: '倒计时', stopwatch: '秒表' };
  const name = modeNames[STATE.mode];
  showToast(`${name}结束啦 🌿`);
  playBell();

  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('计时结束', { body: `${name}时间到${STATE.mode === 'focus' ? '，休息一下吧 🌿' : ''}`, silent: true });
  } else if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ============================================
// TICK
// ============================================
function tick() {
  if (STATE.mode === 'stopwatch') {
    STATE.elapsed++;
    updateDisplay();
    return;
  }

  STATE.remaining--;
  updateDisplay();
  if (STATE.remaining <= 0) finishTimer();
}

// ============================================
// MODE SWITCHING
// ============================================
function switchMode(mode) {
  if (STATE.status === 'running') pauseTimer();
  STATE.mode = mode;

  tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));

  if (mode === 'focus') {
    presetRow.style.display = 'flex';
    customRow.style.display = 'none';
    const active = document.querySelector('.preset.active');
    if (active) applyPreset(active);
    else applyPreset(document.querySelector('[data-min="25"]'));
  } else if (mode === 'countdown') {
    presetRow.style.display = 'none';
    customRow.style.display = 'flex';
    STATE.totalSeconds = (parseInt(customMin.value) || 10) * 60 + (parseInt(customSec.value) || 0);
    STATE.remaining = STATE.totalSeconds;
    STATE.status = 'idle';
    resetTimer();
  } else {
    presetRow.style.display = 'none';
    customRow.style.display = 'none';
    STATE.elapsed = 0;
    STATE.status = 'idle';
    resetTimer();
  }
}

// ============================================
// PRESETS
// ============================================
function applyPreset(el) {
  presetBtns.forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  STATE.totalSeconds = Math.round((parseFloat(el.dataset.min) || 25) * 60);
  STATE.remaining = STATE.totalSeconds;
  STATE.status = 'idle';
  resetTimer();
}

// ============================================
// EVENTS
// ============================================

mainBtn.addEventListener('click', () => {
  if (STATE.status === 'running') { pauseTimer(); return; }
  startTimer();
});

resetBtn.addEventListener('click', resetTimer);

tabs.forEach(tab => tab.addEventListener('click', () => {
  if (tab.classList.contains('active')) return;
  switchMode(tab.dataset.mode);
}));

presetBtns.forEach(btn => btn.addEventListener('click', () => applyPreset(btn)));

applyCustom.addEventListener('click', () => {
  if (STATE.mode !== 'countdown') return;
  const m = parseInt(customMin.value) || 0;
  const s = parseInt(customSec.value) || 0;
  if (m <= 0 && s <= 0) { showToast('请设置有效时间'); return; }
  STATE.totalSeconds = m * 60 + s;
  STATE.remaining = STATE.totalSeconds;
  STATE.status = 'idle';
  resetTimer();
});

[customMin, customSec].forEach(inp => inp.addEventListener('keydown', e => {
  if (e.key === 'Enter') applyCustom.click();
}));

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); mainBtn.click(); }
  if (e.key === 'r' || e.key === 'R') resetBtn.click();
  if (e.key === '1') switchMode('focus');
  if (e.key === '2') switchMode('countdown');
  if (e.key === '3') switchMode('stopwatch');
});

settingsBtn.addEventListener('click', () => {
  const colors = ['#a8b5a0', '#c4a8a0', '#a8b8c4', '#c4b8a0', '#a8c0b0'];
  const cur = ring.style.stroke || '#a8b5a0';
  const idx = colors.findIndex(c => {
    const s = getComputedStyle(ring).stroke || '#a8b5a0';
    return s.includes(c);
  });
  const next = colors[(Math.max(0, idx) + 1) % colors.length];
  ring.style.stroke = next;
  document.querySelector('.btn-primary').style.background = next;
  document.querySelectorAll('.preset.active').forEach(p => p.style.background = next);
  showToast('配色已切换 🎨');
});

// ============================================
// INIT
// ============================================
applyPreset(document.querySelector('[data-min="25"]'));
updateSessionBar();
if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
</script>
</body>
</html>
